name: LootsDisplay CI

on:
  pull_request:
    branches: [ "main" ] # Runs on any PR targeting main

jobs:
  test:
    runs-on: macos-15 # Uses the latest macOS runner with Xcode installed

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Select Xcode
      run: sudo xcode-select -s /Applications/Xcode_16.app # Adjust version as needed

    - name: Run Unit & UI Tests
      run: |
        xcodebuild test \
          -project LootsDisplay.xcodeproj \
          -scheme LootsDisplay \
          -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
          -resultBundlePath TestResults
